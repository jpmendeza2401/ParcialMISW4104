<main class="p-lg">

  <div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
  <div 
    *ngFor="let repo of repositories$ | async"
    [routerLink]="['/repositories', repo.id]"
    class="md:col-span-6 group bg-[#0D1117] border border-[#30363d] rounded-lg p-lg hover:border-primary-container transition-all cursor-pointer"
  >
    <div class="flex items-start justify-between mb-sm">

      <div class="flex items-center gap-sm">
        <span class="material-symbols-outlined text-outline">folder</span>

        <h2 class="font-h2 text-primary-container hover:underline">
          {{ repo.name }}
        </h2>

        <span class="px-2 py-0.5 text-[10px] border border-[#30363d] text-outline rounded-full font-label-caps">
          Public
        </span>
      </div>

      <button class="material-symbols-outlined text-outline hover:text-primary transition-colors">
        star
      </button>

    </div>

    <p class="text-on-surface-variant text-body-sm mb-md line-clamp-2">
      {{ repo.description }}
    </p>

    <div class="flex flex-wrap items-center gap-md text-outline text-[12px] font-medium">

      <div class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-full bg-blue-500"></span>
        <span>{{ repo.language }}</span>
      </div>

      <div class="flex items-center gap-1">
        <span class="material-symbols-outlined text-[16px]">star</span>
        <span>{{ repo.stars }}</span>
      </div>


      <span class="text-outline-variant">
        {{ repo.createdAt }}
      </span>

    </div>
  </div>

</div>
</main>
