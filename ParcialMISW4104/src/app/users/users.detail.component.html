<main *ngIf="user" class="max-w-[1280px] mx-auto px-4 py-8 md:py-12 mb-20">
<div class="grid grid-cols-1 gap-6 mb-12">
    <div class="md:col-span-8">
      <div class="flex flex-col gap-2 mb-6">
        <span class="font-label-caps text-label-caps text-primary tracking-widest uppercase">
          User Profile
        </span>
        <h1 class="font-h1 text-h1 text-white">
          {{ user.name }}
        </h1>
        <p class="font-body-lg text-on-surface-variant flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">mail</span>
          {{ user.email }}
        </p>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="bg-[#0D1117] border border-[#30363d] p-6 rounded-lg">
          <span class="font-label-caps text-label-caps text-outline block mb-2">ROLE</span>
          <div class="flex items-center gap-2">
            <span class="text-white font-semibold">
              {{ user.role }}
            </span>
          </div>
        </div>
        <div class="bg-[#0D1117] border border-[#30363d] p-6 rounded-lg">
          <span class="font-label-caps text-label-caps text-outline block mb-2">LOCATION</span>
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">location_on</span>
            <span class="text-white font-semibold">
              {{ user.location }}
            </span>
          </div>
        </div>
        <div class="bg-[#0D1117] border border-[#30363d] p-6 rounded-lg sm:col-span-2">
          <span class="font-label-caps text-label-caps text-outline block mb-2">AVATAR</span>
          <img 
            [src]="user.avatarUrl" 
            class="w-20 h-20 rounded-full border border-outline-variant"
          />
          <code class="block mt-2 text-primary-container break-all">
            {{ user.avatarUrl }}
          </code>
        </div>
      </div>
    </div>
    <div class="md:col-span-8 space-y-4">
      <div class="bg-[#0D1117] border border-[#30363d] rounded-lg overflow-hidden h-full flex flex-col">
        <div class="h-48 w-full relative">
          <img 
            class="w-full h-full object-cover grayscale opacity-60"
            src="https://picsum.photos/400/200"
          />
          <div class="absolute inset-0 bg-gradient-to-t from-[#0D1117] to-transparent"></div>
          <div class="absolute bottom-4 left-4">
            <span class="bg-primary-container text-white px-3 py-1 rounded-full text-xs font-bold">
              {{ user.location }}
            </span>
          </div>
        </div>
        <div class="p-6">
          <h3 class="font-h2 text-body-lg text-white mb-2">System Status</h3>
          <div class="flex items-center gap-2 text-green-400 mb-4">
            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
            <span class="text-sm font-medium">Active Session</span>
          </div>
          <button class="w-full bg-primary-container text-white py-2 rounded-DEFAULT font-semibold">
            Edit Metadata
          </button>
        </div>
      </div>
    </div>
  </div>

</main>
