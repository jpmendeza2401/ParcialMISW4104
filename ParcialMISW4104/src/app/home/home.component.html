<main class="flex flex-col items-center justify-center min-h-[calc(100vh-120px)] px-gutter relative">
  <!-- Technical Background Decoration -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-20">
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-[#0070f3] blur-[120px] rounded-full opacity-10">
    </div>
  </div>
  <div class="z-10 flex flex-col items-center text-center space-y-xl max-w-[600px]">
    <!-- Hero Text -->
    <div class="space-y-sm">
      <p class="font-code text-primary text-sm tracking-widest uppercase">Development Environment</p>
      <h2 class="font-h1 text-h1 text-white">Repositorio ParcialMISW4104</h2>
    </div>
    <!-- Action Cluster -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-md w-full">
      <!-- Usuarios -->
    <a
      routerLink="/users"
      class="group relative flex flex-col items-center justify-center p-lg bg-surface-container-high border border-outline-variant hover:border-primary-container transition-all rounded-xl active:scale-95"
    >
      <div class="w-12 h-12 flex items-center justify-center bg-primary-container text-white rounded-lg mb-md group-hover:scale-110 transition-transform">
        <span class="material-symbols-outlined">group</span>
      </div>
      <span class="font-h2 text-body-lg text-white font-semibold">Usuarios</span>
      <p class="text-on-surface-variant text-body-sm mt-xs">Explore developer network</p>
    </a>

    <!-- Repositorios -->
    <a
      routerLink="/repositories"
      class="group relative flex flex-col items-center justify-center p-lg bg-surface-container-high border border-outline-variant hover:border-primary-container transition-all rounded-xl active:scale-95"
    >
      <div class="w-12 h-12 flex items-center justify-center bg-primary-container text-white rounded-lg mb-md group-hover:scale-110 transition-transform">
        <span class="material-symbols-outlined">terminal</span>
      </div>
      <span class="font-h2 text-body-lg text-white font-semibold">Repositorios</span>
      <p class="text-on-surface-variant text-body-sm mt-xs">Manage code architecture</p>
    </a>
    </div>
    <!-- Secondary Context -->
    <div class="pt-xl">
      <div
        class="flex items-center gap-2 text-on-surface-variant px-md py-sm bg-surface-container-low rounded-full border border-outline-variant/30">
        <span class="material-symbols-outlined text-[16px]" data-icon="info">info</span>
        <span class="text-body-sm">V.1.0.4 - Production Environment Ready</span>
      </div>
    </div>
  </div>
</main>
