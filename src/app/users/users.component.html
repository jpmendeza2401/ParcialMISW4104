<div class="relative">

  <main class="max-w-[1280px] mx-auto px-gutter py-lg pb-32">

    <div class="mb-lg">
      <h2 class="font-h1 text-h1 text-on-surface mb-2">Explorador de Usuarios</h2>
      <p class="font-body-sm text-body-sm text-on-surface-variant">
        Directorio técnico de colaboradores y desarrolladores del sistema.
      </p>
    </div>

    <div class="bg-surface-container-low rounded-lg border border-outline-variant overflow-hidden">

      <div class="grid grid-cols-12 px-md py-sm bg-surface-container border-b border-outline-variant font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">
        <div class="col-span-6 lg:col-span-5">Nombre</div>
        <div class="col-span-6 lg:col-span-7">Correo</div>
      </div>

      <div class="divide-y divide-outline-variant">

        <div 
          *ngFor="let user of users$ | async"
          (click)="selectUser(user)"
          class="grid grid-cols-12 px-md py-md hover:bg-surface-container-high transition-colors items-center group cursor-pointer"
          [class.bg-primary-container/20]="selectedUser?.id === user.id"
        >

          <div class="col-span-6 lg:col-span-5 flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-[20px]">
              {{ user.role === 'admin' ? 'shield' : 'group' }}
            </span>

            <span class="font-body-lg text-body-lg text-on-surface font-semibold">
              {{ user.name }}
            </span>
          </div>

          <div class="col-span-6 lg:col-span-7">
            <span class="font-code text-code text-primary-fixed-dim bg-primary-container/10 px-2 py-1 rounded">
              {{ user.email }}
            </span>
          </div>

        </div>

      </div>
    </div>

    <div class="mt-lg flex justify-between items-center text-on-surface-variant font-body-sm">
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
        <span>
          Mostrando {{ (users$ | async)?.length || 0 }} usuarios activos
        </span>
      </div>

      <div class="flex gap-4">
        <button class="hover:text-primary transition-colors cursor-pointer">Siguiente</button>
        <button class="text-outline cursor-not-allowed">Anterior</button>
      </div>
    </div>

  </main>

  <div 
    *ngIf="selectedUser"
    class="fixed inset-0 bg-black/50 z-40"
    (click)="selectedUser = null"
  ></div>

  <div 
    class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-surface-container border-l border-outline-variant z-50 transform transition-all duration-300 ease-in-out"
    [class.translate-x-full]="!selectedUser"
  >

    <div class="p-lg h-full overflow-y-auto">

      <div class="flex justify-end mb-md">
        <button 
          (click)="selectedUser = null"
          class="material-symbols-outlined text-on-surface hover:text-primary transition-colors"
        >
          close
        </button>
      </div>
      <app-user-detail [user]="selectedUser"></app-user-detail>

    </div>

  </div>

</div>
